<div class="modal-overlay" *ngIf="showModal" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h5 class="modal-title">
        {{ editingExperience ? 'Editar Experiencia' : 'Agregar Experiencia' }}
      </h5>
      <button type="button" class="btn-close" (click)="onClose()"></button>
    </div>

    <div class="modal-body">
      <!-- Error Message -->
      <div *ngIf="error" class="alert alert-danger alert-dismissible fade show">
        {{ error }}
        <button
          type="button"
          class="btn-close"
          (click)="error = ''"
        ></button>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
        {{ successMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre/Puesto <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            formControlName="nombre"
            placeholder="Ej: Desarrollador Web"
          />
        </div>

        <div class="mb-3">
          <label for="cargo" class="form-label">Cargo <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            id="cargo"
            formControlName="cargo"
            placeholder="Ej: Desarrollador Junior"
          />
        </div>

        <div class="mb-3">
          <label for="empresa" class="form-label">Empresa <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            id="empresa"
            formControlName="empresa"
            placeholder="Ej: TechCorp S.A."
          />
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="fechaInicio" class="form-label">Fecha Inicio <span class="text-danger">*</span></label>
            <input
              type="date"
              class="form-control"
              id="fechaInicio"
              formControlName="fechaInicio"
            />
          </div>

          <div class="col-md-6 mb-3">
            <label for="fechaFin" class="form-label">Fecha Fin <span class="text-danger">*</span></label>
            <input
              type="date"
              class="form-control"
              id="fechaFin"
              formControlName="fechaFin"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="descripcion" class="form-label">Descripción</label>
          <textarea
            class="form-control"
            id="descripcion"
            formControlName="descripcion"
            rows="3"
            placeholder="Descripción de tus responsabilidades..."
          ></textarea>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            (click)="onClose()"
            [disabled]="loading"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="loading || form.invalid"
          >
            <span *ngIf="!loading">
              {{ editingExperience ? 'Actualizar' : 'Agregar' }}
            </span>
            <span *ngIf="loading">
              <span
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              Guardando...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
